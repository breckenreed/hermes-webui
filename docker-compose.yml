services:
  hermes-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-webui
    restart: unless-stopped
    ports:
      - "8090:8000"
    environment:
      # Name of the running Hermes container to exec into
      - HERMES_CONTAINER=hermes-agent
      # Passed through to `hermes` so the agent can reach the LLM endpoint
      - LLM_CLIENT_UID=${LLM_CLIENT_UID}
      # Access token for the webui itself. REQUIRED on any shared network —
      # without it, anyone who can reach the port gets full agent access.
      - WEBUI_TOKEN=${WEBUI_TOKEN:-}
      # 1 = serve HTTPS with a self-signed cert (protects the token and chat
      # content from LAN sniffing; browsers warn once — accept the cert).
      - WEBUI_TLS=${WEBUI_TLS:-0}
      # Optional: pin a model, e.g. google/gemma-4-12b (blank = use Hermes default)
      - HERMES_MODEL=
      # Context note prepended to every prompt so small local models use their
      # tools instead of hallucinating their environment. Set empty to disable.
      # Leave unset to use the built-in default (mentions /host/opser-local).
      # - HERMES_SYSTEM_PREAMBLE=You are in a Linux container; the vault is at /host/opser-local (rw). Always use your tools; never guess.
    env_file:
      - ./.env
    volumes:
      # Docker Desktop exposes the engine here; this lets the webui run
      # `docker exec hermes-agent hermes ...`
      - //var/run/docker.sock:/var/run/docker.sock
