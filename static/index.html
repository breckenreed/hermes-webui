<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hermes · WebUI</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230d0f12'/%3E%3Cpath d='M16 5l9.5 5.5v11L16 27l-9.5-5.5v-11z' fill='none' stroke='%23e07b39' stroke-width='2.4' stroke-linejoin='round'/%3E%3Cpath d='M12 11v10M20 11v10M12 16h8' stroke='%23f0a868' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E" />
<meta name="theme-color" content="#0d0f12" />
<style>
  :root{
    --bg:#0d0f12; --panel:#14171c; --panel2:#191d23; --border:#252b33;
    --text:#e6e8eb; --muted:#8b949e; --accent:#e07b39; --accent2:#f0a868;
    --user:#1c2937; --assistant:#16191f; --code:#0a0c0f; --green:#3fb950; --red:#f85149;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;height:100vh;height:100dvh;overflow:hidden}

  /* Sidebar */
  #sidebar{width:270px;flex:0 0 270px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column}
  #brand{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
  #brand h1{font-size:15px;margin:0;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
  #brand .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red)}
  #brand .dot.ok{background:var(--green);box-shadow:0 0 8px var(--green)}
  #brand small{color:var(--muted);font-family:var(--mono);font-size:11px;display:block;margin-top:4px}
  #newchat{margin:12px;padding:10px;background:var(--accent);color:#111;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
  #newchat:hover{background:var(--accent2)}
  #seslabel{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.8px;padding:4px 16px}
  #sessions{flex:1;overflow-y:auto;padding:0 8px 12px}
  .ses{position:relative;padding:9px 10px;border-radius:7px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
  .ses:hover{background:var(--panel2)}
  .ses.active{background:var(--panel2);border-color:var(--border)}
  .ses .t{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:22px}
  .ses .m{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
  .ses .dots{position:absolute;top:6px;right:6px;width:22px;height:22px;border:none;background:transparent;color:var(--muted);
    border-radius:5px;cursor:pointer;font-size:15px;line-height:1;opacity:0;display:flex;align-items:center;justify-content:center}
  .ses:hover .dots,.ses.active .dots{opacity:1}
  .ses .dots:hover{background:#2a3038;color:var(--text)}
  .menu{position:fixed;z-index:50;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:4px;
    box-shadow:0 8px 26px rgba(0,0,0,.5);min-width:150px}
  .menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);
    padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--sans)}
  .menu button:hover{background:var(--panel)}
  .menu button.danger{color:var(--red)}
  .menu .sep{height:1px;background:var(--border);margin:4px 2px}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--border);
    color:var(--text);padding:9px 16px;border-radius:8px;font-size:13px;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.5)}

  /* Main */
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--panel)}
  #topbar .k{font-family:var(--mono);font-size:12px;color:var(--muted)}
  #topbar .v{font-family:var(--mono);font-size:12px;color:var(--accent2)}
  #chat{flex:1;overflow-y:auto;padding:24px 0}
  .wrap{max-width:820px;margin:0 auto;padding:0 20px}
  .msg{display:flex;gap:14px;padding:16px 0}
  .msg .av{flex:0 0 28px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono)}
  .msg.user .av{background:var(--user);color:var(--accent2)}
  .msg.assistant .av{background:var(--accent);color:#111}
  .msg .body{flex:1;min-width:0;padding-top:3px;line-height:1.6;font-size:14.5px}
  .msg .body p{margin:0 0 10px}
  .msg .body p:last-child{margin-bottom:0}
  .msg .body h1,.body h2,.body h3{margin:14px 0 8px;line-height:1.3}
  .msg .body ul,.body ol{margin:6px 0 10px;padding-left:22px}
  .msg .body li{margin:3px 0}
  .msg .body code{background:var(--code);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:12.5px;border:1px solid var(--border)}
  .msg .body pre{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:12px 14px;overflow-x:auto;margin:8px 0}
  .msg .body pre code{background:none;border:none;padding:0;font-size:12.5px;line-height:1.5;display:block}
  .msg .body a{color:var(--accent2)}
  .msg.assistant .body{color:var(--text)}
  .tool{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);border-left:2px solid var(--accent);border-radius:5px;padding:6px 10px;margin:4px 0;white-space:pre-wrap;word-break:break-word}
  .cursor{display:inline-block;width:8px;height:15px;background:var(--accent);animation:blink 1s steps(2) infinite;vertical-align:text-bottom;margin-left:2px}
  @keyframes blink{50%{opacity:0}}
  .empty{color:var(--muted);text-align:center;margin-top:12vh;font-size:14px}
  .empty .big{font-size:34px;margin-bottom:14px}
  .empty code{font-family:var(--mono);color:var(--accent2)}

  /* Composer */
  #composer{border-top:1px solid var(--border);background:var(--panel);padding:14px 0}
  #composer .wrap{display:flex;gap:10px;align-items:flex-end;position:relative}
  #input{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:10px;color:var(--text);
    font-family:var(--sans);font-size:14px;padding:11px 14px;resize:none;max-height:200px;line-height:1.5;outline:none}
  #input:focus{border-color:var(--accent)}
  #send{background:var(--accent);color:#111;border:none;border-radius:10px;width:44px;height:44px;cursor:pointer;font-size:18px;flex:0 0 44px;display:flex;align-items:center;justify-content:center;line-height:1}
  #send:disabled{opacity:.4;cursor:not-allowed}
  #send:hover:not(:disabled){background:var(--accent2)}
  #send.stopping{background:var(--red);color:#fff;font-size:15px}
  #send.stopping:hover{background:#ff6b60}
  #ctxmeter{cursor:help}
  #ctxmeter.warn{color:#f0b429}
  #ctxmeter.danger{color:var(--red)}
  .tool.call{border-left-color:var(--accent);color:var(--accent2)}
  .tool.result{border-left-color:#3d4753;color:var(--muted)}
  .tool .ts{color:#5a6570}
  .msgtime{color:#5a6570;font-family:var(--mono);font-size:10.5px;margin-top:6px}
  .status{color:var(--muted);font-size:13px;font-family:var(--mono);margin:6px 0;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
  #agentbtn{background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:10px;
    height:44px;padding:0 12px;cursor:pointer;font-size:12px;font-weight:600;flex:0 0 auto;white-space:nowrap;
    display:flex;align-items:center;gap:5px}
  #agentbtn:hover{border-color:var(--accent)}
  #agentbtn.on{background:rgba(224,123,57,.16);color:var(--accent2);border-color:var(--accent)}
  #modelbtn{background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:10px;
    height:44px;padding:0 12px;cursor:pointer;font-size:12px;font-weight:600;flex:0 0 auto;white-space:nowrap;
    max-width:180px;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
  #modelbtn:hover{border-color:var(--accent)}
  #modelbtn.online{background:rgba(63,185,80,.14);color:#7ee08a;border-color:var(--green)}
  .modelmenu{position:absolute;bottom:100%;right:0;margin-bottom:6px;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;padding:4px;box-shadow:0 8px 26px rgba(0,0,0,.5);
    z-index:20;min-width:230px}
  .modelmenu .item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;
    align-items:center;justify-content:space-between;gap:8px}
  .modelmenu .item:hover{background:var(--panel)}
  .modelmenu .item.sel{color:var(--accent2)}
  .modelmenu .item small{display:block;color:var(--muted);font-size:11px;font-family:var(--mono)}
  .modelmenu .sep{height:1px;background:var(--border);margin:4px 2px}
  .hint{max-width:820px;margin:6px auto 0;padding:0 20px;color:var(--muted);font-size:11px;font-family:var(--mono)}
  ::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:#2a3038;border-radius:5px}

  .queuebar{max-width:820px;margin:0 auto 6px;padding:7px 12px;border-radius:8px;background:rgba(224,123,57,.12);
    border:1px solid var(--accent);color:var(--accent2);font-size:12px;font-family:var(--mono);
    display:flex;align-items:center;gap:10px}
  .queuebar #queuetext{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .queuebar button{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:14px;padding:0 4px;flex:0 0 auto}
  .queuebar button:hover{color:var(--text)}

  .slashmenu{position:absolute;bottom:100%;left:0;right:0;margin-bottom:6px;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;padding:4px;box-shadow:0 8px 26px rgba(0,0,0,.5);z-index:20}
  .slashmenu .item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px}
  .slashmenu .item:hover,.slashmenu .item.sel{background:var(--panel)}
  .slashmenu .item b{color:var(--accent2);font-family:var(--mono)}
  .slashmenu .item small{display:block;color:var(--muted);font-size:11px;margin-top:1px}

  /* Lock screen (shown when the backend requires an access token) */
  #lock{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;align-items:center;justify-content:center}
  #lock.show{display:flex}
  #lock .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:28px;width:min(92vw,360px);text-align:center}
  #lock h2{margin:0 0 6px;font-size:17px}
  #lock p{color:var(--muted);font-size:13px;margin:0 0 16px}
  #lock input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--text);
    padding:11px 12px;font-size:16px;outline:none;margin-bottom:10px;font-family:var(--mono)}
  #lock input:focus{border-color:var(--accent)}
  #lock button{width:100%;padding:11px;background:var(--accent);color:#111;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px}
  #lock .err{color:var(--red);font-size:12px;min-height:16px;margin-top:8px}

  /* Hamburger + drawer backdrop (mobile only) */
  #menubtn{display:none;background:none;border:none;color:var(--text);font-size:22px;line-height:1;cursor:pointer;padding:2px 6px;margin-right:2px}
  #backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30}

  /* ── Mobile layout ──────────────────────────────── */
  @media (max-width:720px){
    #menubtn{display:block}
    #sidebar{position:fixed;top:0;left:0;bottom:0;width:82vw;max-width:320px;flex-basis:auto;
      z-index:40;transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 0 34px rgba(0,0,0,.6)}
    #sidebar.open{transform:translateX(0)}
    #backdrop.show{display:block}
    #main{width:100%;min-width:0}
    .wrap{padding:0 12px}
    #topbar{padding:10px 12px;gap:6px}
    #topbar .k{display:none}
    #topbar #containername{display:none}
    #cursession{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70vw}
    #chat{padding:14px 0}
    .msg{gap:10px;padding:12px 0}
    .msg .av{flex:0 0 24px;width:24px;height:24px;font-size:11px}
    .msg .body{font-size:15px}
    .msg .body pre{font-size:12px}
    #composer{padding:10px 0}
    #composer .wrap{gap:8px}
    #input{font-size:16px;padding:10px 12px}   /* 16px avoids iOS focus-zoom */
    #send{width:46px;height:46px;flex-basis:46px}
    .hint{display:none}
    .ses .dots{opacity:1}                        /* no hover on touch */
    .menu{min-width:200px}
    .menu button{padding:11px 12px}
  }
</style>
</head>
<body>
  <div id="lock">
    <div class="card">
      <h2>🔒 Hermes WebUI</h2>
      <p>This instance requires an access token.</p>
      <input id="lockinput" type="password" placeholder="Access token" autocomplete="current-password" />
      <button id="lockbtn">Unlock</button>
      <div class="err" id="lockerr"></div>
    </div>
  </div>
  <div id="backdrop"></div>
  <aside id="sidebar">
    <div id="brand">
      <h1><span class="dot" id="statusdot"></span> HERMES <span style="color:var(--accent)">WebUI</span></h1>
      <small id="statustext">connecting…</small>
    </div>
    <button id="newchat">+ New chat</button>
    <div id="seslabel">Recent sessions</div>
    <div id="sessions"></div>
  </aside>

  <section id="main">
    <div id="topbar">
      <button id="menubtn" aria-label="Toggle sessions">☰</button>
      <span class="k">chat</span><span class="v" id="cursession">—</span>
      <span style="flex:1"></span>
      <span class="k">ctx</span><span class="v" id="ctxmeter" title="">—</span>
      <span class="k">container</span><span class="v" id="containername">hermes-agent</span>
    </div>
    <div id="chat"><div class="wrap" id="messages"></div></div>
    <div id="composer">
      <div class="wrap">
        <textarea id="input" rows="1" placeholder="Command Hermes…  (Enter to send · Shift+Enter for newline)"></textarea>
        <button id="modelbtn" title="Pick which model handles the next message">🖥 Local</button>
        <button id="agentbtn" title="Agent mode: push the model to execute multi-step / todo plans to completion in one run">⚡ Agent</button>
        <button id="send" title="Send">➤</button>
      </div>
      <div class="queuebar" id="queuebar" style="display:none">
        <span id="queuetext"></span>
        <button id="queuecancel" title="Cancel">✕</button>
      </div>
      <div class="hint">Runs <code>hermes -z … --resume &lt;session&gt; --yolo</code> inside the container. Type <code>/queue &lt;text&gt;</code> to line up a follow-up, or <code>/steer &lt;text&gt;</code> to redirect the current step.</div>
    </div>
  </section>

<script>
const $ = s => document.querySelector(s);
const messagesEl = $("#messages"), chatEl = $("#chat");

/* ---------- access token ----------
   Every /api/* call carries `Authorization: Bearer <token>`. A 401 flips the
   lock screen; the token is kept in localStorage after the first unlock. */
const TOKEN_LS="hermes_webui_token";
const _fetch = window.fetch.bind(window);
window.fetch = (url, opts={}) => {
  if (String(url).startsWith("/api/")) {
    const t = localStorage.getItem(TOKEN_LS);
    if (t) opts.headers = {...(opts.headers||{}), "Authorization": "Bearer "+t};
  }
  return _fetch(url, opts).then(r => {
    if (r.status===401 && String(url).startsWith("/api/")) showLock();
    return r;
  });
};
function showLock(msg){
  $("#lock").classList.add("show");
  if(msg) $("#lockerr").textContent=msg;
  $("#lockinput").focus();
}
async function tryUnlock(){
  const t=$("#lockinput").value.trim();
  if(!t) return;
  localStorage.setItem(TOKEN_LS, t);
  const r=await _fetch("/api/health", {headers:{"Authorization":"Bearer "+t}});
  if(r.status===401){ $("#lockerr").textContent="Invalid token"; return; }
  $("#lock").classList.remove("show"); $("#lockerr").textContent="";
  location.reload();   // clean boot with the working token
}
document.addEventListener("DOMContentLoaded",()=>{
  $("#lockbtn").onclick=tryUnlock;
  $("#lockinput").addEventListener("keydown",e=>{ if(e.key==="Enter") tryUnlock(); });
});
/* In-flight turns are tracked PER CONVERSATION (convoId -> record), never as
   a single global. Earlier versions used one global `busy`/`messages`/
   `activeId`, which meant an async send()/recoverPending() call that outlived
   a conversation switch (new tab, quick re-login + switch, etc.) would apply
   its result to whatever conversation happened to be active when it finished
   — corrupting the WRONG chat with another chat's reply ("phantom messages").
   Every write below is keyed by the conversation the turn actually belongs
   to (`forConvo`), snapshotted at call time and re-checked before any DOM
   write; only the live-in-storage data uses that id, never the live global
   `activeId`. */
const inFlight = new Map();   // convoId -> {turnKey, abort, watchdogAborted, lastEventTs, userStopped, steering, steerText, queued}
function isBusy(id){ return inFlight.has(id); }

/* ---------- conversation store (owned by the webui, persisted locally) ----------
   hermes -z is one-shot and does not carry context across turns, so the webui
   keeps each conversation itself and injects the history into every prompt.
   localStorage:  hermes_convos = [{id,title,updated}]  ·  hermes_msgs_<id> = [{role,text,tools}]
*/
const CONVOS_LS="hermes_convos", ACTIVE_LS="hermes_active", PENDING_LS="hermes_pending", AGENT_LS="hermes_agent_mode";
const msgsKey = id => "hermes_msgs_"+id;
let convos = readJSON(CONVOS_LS, []);
let activeId = localStorage.getItem(ACTIVE_LS) || null;
let messages = [];          // messages of the active conversation
let agentMode = localStorage.getItem(AGENT_LS)==="1";   // completion pressure for multi-step work

function readJSON(k, d){ try{ return JSON.parse(localStorage.getItem(k)) ?? d; }catch(e){ return d; } }
function writeJSON(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ /* private mode / quota */ } }
function newConvoId(){ return "c_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function convoTitle(id){ const c=convos.find(x=>x.id===id); return c ? c.title : null; }
// Storage is always the source of truth for a conversation's messages. These
// helpers never touch the global `messages`/`activeId` — callers decide
// separately whether the conversation they're writing is also the one on
// screen right now (see isActive() usages in send()/recoverPending()).
function loadMsgs(id){ return readJSON(msgsKey(id), []); }
function saveMsgs(id, arr){ writeJSON(msgsKey(id), arr); if(id===activeId) messages=arr; }

function touchConvo(id, title){
  let c = convos.find(x=>x.id===id);
  if(!c){ c={id, title: title||"New chat", updated: Date.now()}; }
  else { if(title) c.title=title; c.updated=Date.now(); convos=convos.filter(x=>x.id!==id); }
  convos.unshift(c);
  writeJSON(CONVOS_LS, convos);
}
function timeago(ts){ if(!ts) return ""; const s=(Date.now()-ts)/1000;
  if(s<60) return "just now"; if(s<3600) return Math.floor(s/60)+"m ago";
  if(s<86400) return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; }

/* ---------- context-window meter ----------
   used ≈ Hermes' fixed prompt budget (system prompt + skills + tool schemas,
   reported by /api/context) + the injected conversation history. Estimated at
   ~4 chars/token for ASCII, ~2 for non-ASCII (Cyrillic etc.). */
let ctxInfo=null;
function estTokens(s){
  if(!s) return 0;
  let ascii=0, other=0;
  for(let i=0;i<s.length;i++){ if(s.charCodeAt(i)<128) ascii++; else other++; }
  return Math.ceil(ascii/4 + other/2);
}
function fmtK(n){ return n>=1000 ? (n/1000).toFixed(1).replace(/\.0$/,"")+"k" : String(n); }
function updateCtxMeter(){
  const el=$("#ctxmeter"); if(!el || !ctxInfo) return;
  const conv = messages.reduce((a,m)=>a+estTokens(m.text)+4, 0);
  const used = (ctxInfo.base_tokens||0) + conv;
  const max = ctxInfo.context_length||0;
  const pct = max ? Math.round(used/max*100) : 0;
  el.textContent = max ? `~${fmtK(used)} / ${fmtK(max)} (${pct}%)` : `~${fmtK(used)}`;
  el.classList.toggle("warn", pct>=70 && pct<90);
  el.classList.toggle("danger", pct>=90);
  el.title = `model: ${ctxInfo.model||"?"}\nfixed prompt budget (system+skills+tools): ~${fmtK(ctxInfo.base_tokens||0)} tokens\nconversation history: ~${fmtK(conv)} tokens\ntoken counts are estimates (~4 chars/token)`;
}
async function fetchContext(){
  try{ const r=await fetch("/api/context"); ctxInfo=await r.json(); updateCtxMeter(); }
  catch(e){ /* backend offline */ }
}

// Split a captured turn's raw output back into assistant text + tool lines.
function parseTurn(raw){
  let finalText=""; const toolLines=[];
  (raw||"").split("\n").forEach(line=>{
    if(isToolLine(line)) toolLines.push(line);
    else finalText += (finalText?"\n":"") + line;
  });
  return {finalText, toolLines};
}

/* ---------- tiny, safe markdown renderer ---------- */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function renderMarkdown(src){
  const blocks = src.split(/```/);
  let html = "";
  blocks.forEach((b,i)=>{
    if(i%2===1){ // fenced code
      const nl=b.indexOf("\n");
      const code = nl>=0 ? b.slice(nl+1) : b;
      html += `<pre><code>${esc(code.replace(/\n$/,""))}</code></pre>`;
    } else {
      html += renderInline(b);
    }
  });
  return html;
}
function renderInline(text){
  const lines = text.split("\n");
  let out="", listOpen=null;
  const flush=()=>{ if(listOpen){out+=`</${listOpen}>`;listOpen=null;} };
  for(let ln of lines){
    let h = esc(ln);
    h = h.replace(/`([^`]+)`/g,"<code>$1</code>");
    h = h.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
    h = h.replace(/(^|[^*])\*([^*]+)\*/g,"$1<em>$2</em>");
    h = h.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    let m;
    if((m=ln.match(/^(#{1,3})\s+(.*)/))){ flush(); out+=`<h${m[1].length}>${renderInlineNoBlock(m[2])}</h${m[1].length}>`; continue; }
    if((m=ln.match(/^\s*[-*]\s+(.*)/))){ if(listOpen!=="ul"){flush();out+="<ul>";listOpen="ul";} out+=`<li>${renderInlineNoBlock(m[1])}</li>`; continue; }
    if((m=ln.match(/^\s*\d+\.\s+(.*)/))){ if(listOpen!=="ol"){flush();out+="<ol>";listOpen="ol";} out+=`<li>${renderInlineNoBlock(m[1])}</li>`; continue; }
    if(ln.trim()===""){ flush(); continue; }
    flush(); out+=`<p>${h}</p>`;
  }
  flush();
  return out;
}
function renderInlineNoBlock(t){
  return esc(t).replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}

/* ---------- chat UI ---------- */
function clearEmpty(){ const e=$(".empty"); if(e) e.remove(); }
function showEmpty(){
  messagesEl.innerHTML = `<div class="empty"><div class="big">⬡</div>
    Local Hermes is ready.<br>Send a command to begin.</div>`;
}
function renderConversation(){
  if(!messages.length){ showEmpty(); return; }
  messagesEl.innerHTML="";
  messages.forEach(m=> renderMessage(m.role, m.text, m.tools, m.ts));
  scroll();
}
function addMsg(role){
  clearEmpty();
  const wrap=document.createElement("div"); wrap.className=`msg ${role}`;
  const av=document.createElement("div"); av.className="av"; av.textContent = role==="user"?"You":"H";
  const body=document.createElement("div"); body.className="body";
  wrap.append(av,body); messagesEl.append(wrap);
  scroll();
  return body;
}
function scroll(){ chatEl.scrollTop = chatEl.scrollHeight; }

function renderConvos(){
  const box = $("#sessions"); box.innerHTML="";
  convos.forEach(c=>{
    const el=document.createElement("div"); el.className="ses"+(c.id===activeId?" active":"");
    el.innerHTML=`<div class="t">${esc(c.title||"(untitled)")}</div>`+
      `<div class="m">${esc(timeago(c.updated))}</div>`+
      `<button class="dots" title="Actions">⋯</button>`;
    el.onclick=()=>{ openConvo(c.id); };
    el.querySelector(".dots").onclick=(e)=>{ e.stopPropagation(); openMenu(e.currentTarget, c); };
    box.append(el);
  });
}

/* ---------- session context menu ---------- */
let openMenuEl=null;
function closeMenu(){ if(openMenuEl){ openMenuEl.remove(); openMenuEl=null; } }
document.addEventListener("click", closeMenu);
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeMenu(); });

function openMenu(anchor, s){
  closeMenu();
  const m=document.createElement("div"); m.className="menu";
  m.innerHTML=
    `<button data-a="rename">✎ Rename</button>`+
    `<button data-a="copy">⧉ Copy ID</button>`+
    `<div class="sep"></div>`+
    `<button data-a="delete" class="danger">🗑 Delete</button>`;
  document.body.append(m);
  const r=anchor.getBoundingClientRect();
  m.style.top=(r.bottom+4)+"px";
  m.style.left=Math.min(r.left, window.innerWidth-m.offsetWidth-8)+"px";
  m.addEventListener("click", e=>e.stopPropagation());
  m.querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{ const a=b.dataset.a; closeMenu();
      if(a==="rename") renameConvo(s);
      else if(a==="copy"){ navigator.clipboard.writeText(s.id).then(()=>toast("Conversation ID copied")); }
      else if(a==="delete") deleteConvo(s);
    };
  });
  openMenuEl=m;
}

function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.append(t); setTimeout(()=>t.remove(),2200);
}

function deleteConvo(c){
  if(!confirm(`Delete conversation "${c.title||"(untitled)"}"?`)) return;
  convos = convos.filter(x=>x.id!==c.id);
  writeJSON(CONVOS_LS, convos);
  try{ localStorage.removeItem(msgsKey(c.id)); }catch(e){}
  clearPending(c.id);
  const t=recoverTimers.get(c.id); if(t){ clearTimeout(t); recoverTimers.delete(c.id); }
  const rec=inFlight.get(c.id); if(rec){ rec.userStopped=true; rec.abort.abort(); }
  if(c.id===activeId){
    if(convos.length) openConvo(convos[0].id);
    else newConvo();
  }
  renderConvos();
  toast("Conversation deleted");
}

function renameConvo(c){
  const title=prompt("Rename conversation:", c.title||"");
  if(title===null) return;
  const t=title.trim(); if(!t) return;
  touchConvo(c.id, t);
  if(c.id===activeId) $("#cursession").textContent=t;
  renderConvos();
  toast("Renamed");
}

/* Local wall-clock HH:MM:SS from an epoch (s or ms) or now. */
function fmtClock(ts){
  const d = ts ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date();
  const p=n=>String(n).padStart(2,"0");
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function fmtElapsed(sec){
  sec=Math.max(0,Math.round(sec));
  return sec<60 ? `${sec}s` : `${Math.floor(sec/60)}m ${sec%60}s`;
}
/* A tool line may carry a leading "HH:MM:SS " — split it out and dim it. */
function toolHtml(t){
  const m = t.match(/^(\d{2}:\d{2}:\d{2})\s+([\s\S]*)$/);
  const time = m ? m[1] : "";
  const body = m ? m[2] : t;
  const cls = body.startsWith("●") ? "tool call" : (body.startsWith("↳") ? "tool result" : "tool");
  return `<div class="${cls}">${time?`<span class="ts">${time}</span> `:""}${esc(body)}</div>`;
}

/* render a full transcript message (with optional tool lines + a time footer) */
function renderMessage(role, text, tools, ts){
  const body=addMsg(role==="user"?"user":"assistant");
  let html="";
  (tools||[]).forEach(t=> html+=toolHtml(t));
  if(text) html += renderMarkdown(text);
  if(ts && role!=="user") html += `<div class="msgtime">${fmtClock(ts)}</div>`;
  body.innerHTML=html;
}

function openConvo(id){
  // Switching conversations is always allowed, even while another (or this)
  // conversation has a turn running in the background — that turn keeps
  // going server-side and in this tab's send() call regardless of which
  // conversation is on screen; see the inFlight map.
  toggleSidebar(false);
  activeId=id; try{ localStorage.setItem(ACTIVE_LS, id); }catch(e){}
  messages = loadMsgs(id);
  $("#cursession").textContent = convoTitle(id) || "chat";
  renderConversation();
  renderConvos();
  updateCtxMeter();
  syncComposerUI();
  updateQueueBar();
  recoverPending(id);   // in case this conversation has an interrupted reply
}

function newConvo(){
  toggleSidebar(false);
  activeId = newConvoId();
  try{ localStorage.setItem(ACTIVE_LS, activeId); }catch(e){}
  messages = [];
  $("#cursession").textContent = "New chat";
  showEmpty();
  renderConvos();
  updateCtxMeter();
  syncComposerUI();
  updateQueueBar();
  $("#input").focus();
}

async function health(){
  try{
    const r=await fetch("/api/health"); const j=await r.json();
    $("#statusdot").classList.toggle("ok", !!j.ok);
    $("#statustext").textContent = j.ok ? `${j.container} · running` : `${j.container} · ${j.running||"offline"}`;
    $("#containername").textContent = j.container;
  }catch(e){ $("#statustext").textContent="backend offline"; }
}

/* ---------- send / stop (per conversation) ---------- */

/* Agent-mode auto-continue: the model emits [[TASK_COMPLETE]] only when the
   whole task is done. While it's absent, the webui re-prompts the model to
   keep executing — bounded by AGENT_MAX_ROUNDS, sequential (one process at a
   time), so it stops itself after the last step instead of stalling on a plan. */
const AGENT_DONE_TOKEN="[[TASK_COMPLETE]]";
const AGENT_MAX_ROUNDS=8;
const AGENT_CONTINUE_PROMPT="Continue. Execute the next pending step(s) of your plan now with your tools. Do not stop until every item is complete; then end with [[TASK_COMPLETE]].";
let agentRounds=0;
const stripDoneToken = s => (s||"").split(AGENT_DONE_TOKEN).join("").replace(/\n{3,}/g,"\n\n").trim();

// Reflects the ACTIVE conversation's in-flight state on the Send/Stop button
// — each conversation's own busy state lives in inFlight, this just mirrors
// whichever one is currently on screen.
function syncComposerUI(){
  const btn=$("#send"), b=isBusy(activeId);
  btn.classList.toggle("stopping", b);
  btn.textContent = b ? "■" : "➤";
  btn.title = b ? "Stop" : "Send";
}

function updateQueueBar(){
  const bar=$("#queuebar"); const rec=inFlight.get(activeId);
  if(rec && rec.queued){
    bar.style.display="flex";
    $("#queuetext").textContent = "Queued: "+rec.queued;
  } else {
    bar.style.display="none";
  }
}
$("#queuecancel").onclick=()=>{
  const rec=inFlight.get(activeId);
  if(rec){ rec.queued=null; updateQueueBar(); toast("Queue cleared"); }
};

// Stop the turn running in a conversation (default: the one on screen).
// Distinguishing a deliberate Stop from a watchdog/steer abort is what lets
// send()'s catch block show the right outcome instead of a generic error.
function stopGeneration(forId){
  const id=forId||activeId, rec=inFlight.get(id);
  if(!rec) return;
  rec.userStopped=true;
  fetch("/api/stop",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session:rec.turnKey})}).catch(()=>{});
  rec.abort.abort();
}

// /queue <text> — line up a follow-up that fires automatically right after
// the current turn finishes (or immediately if nothing is running).
function queueMessage(text, forId){
  const id=forId||activeId, rec=inFlight.get(id);
  if(!rec){ send({text, convoId:id}); return; }
  rec.queued = rec.queued ? rec.queued+"\n"+text : text;
  toast("Queued — sends once the current turn finishes");
  if(id===activeId) updateQueueBar();
}

// /steer <text> — hermes -z can't be interrupted mid-generation (it isn't
// reading stdin while it runs), so "steering" means: stop the current step,
// then immediately re-prompt with the new instruction PLUS whatever partial
// output/tool trace it had produced — the closest honest equivalent of
// redirecting a running agent within this architecture.
function steerMessage(text, forId){
  const id=forId||activeId, rec=inFlight.get(id);
  if(!rec){ send({text, convoId:id}); return; }
  rec.steering=true; rec.steerText=text;
  toast("Steering — stopping the current step and redirecting…");
  fetch("/api/stop",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session:rec.turnKey})}).catch(()=>{});
  rec.abort.abort();
}

const SLASH_COMMANDS = {
  queue: { desc:"Send this after the current turn finishes", run:(t)=>queueMessage(t) },
  steer: { desc:"Stop the current step and redirect with new instructions", run:(t)=>steerMessage(t) },
  stop:  { desc:"Stop the running turn", run:()=>stopGeneration(), noArg:true },
};
function trySlashCommand(raw){
  const m=raw.match(/^\/(\w+)\b\s*([\s\S]*)$/);
  if(!m) return false;
  const cmd=SLASH_COMMANDS[m[1].toLowerCase()];
  if(!cmd) return false;
  const arg=m[2].trim();
  if(!cmd.noArg && !arg){ toast(`Usage: /${m[1]} <message>`); return true; }
  cmd.run(arg);
  return true;
}

/* arg forms:
   - undefined            -> read the composer box for the active conversation
   - string                -> agent-mode auto-continue text, active conversation
   - {text, convoId,
      displayText, isAuto, isQueued} -> explicit send for a specific
                                          conversation (queue/steer/auto-continue
                                          use this so a turn always resolves
                                          against the conversation it belongs
                                          to, never whichever one is on screen
                                          when the promise settles) */
async function send(arg){
  let sendText, displayText, forConvo, isAuto=false, isQueued=false;
  if(typeof arg==="string"){ sendText=displayText=arg; forConvo=activeId; isAuto=true; }
  else if(arg && typeof arg==="object"){
    sendText=arg.text; displayText=arg.displayText ?? arg.text;
    forConvo=arg.convoId||activeId; isAuto=!!arg.isAuto; isQueued=!!arg.isQueued;
  } else { sendText=displayText=$("#input").value.trim(); forConvo=activeId; }
  sendText=(sendText||"").trim();
  if(!sendText) return;
  if(!forConvo){ forConvo=newConvoId(); try{ activeId=forConvo; localStorage.setItem(ACTIVE_LS, forConvo); }catch(e){} messages=[]; }
  if(isBusy(forConvo) && !isQueued){
    if(forConvo===activeId) toast("Already running here — try /queue or /steer");
    return;
  }
  if(!isAuto) agentRounds=0;   // any real/queued/steered message starts a fresh agent-mode budget

  const isActive = () => activeId===forConvo;   // re-checked before every DOM write below

  if(!isAuto && isActive()){ $("#input").value=""; $("#input").style.height="auto"; }

  // History = the conversation so far (role/text only); the backend injects it.
  let msgs = loadMsgs(forConvo);
  const history = msgs.map(m=>({role:m.role, text:m.text}));

  if(!isAuto){
    const firstUser = !msgs.some(m=>m.role==="user");
    msgs=[...msgs, {role:"user", text:displayText, tools:[]}];
    saveMsgs(forConvo, msgs);
    touchConvo(forConvo, firstUser ? displayText.slice(0,60) : null);
    if(isActive()){
      const userBody=addMsg("user"); userBody.innerHTML=renderMarkdown(displayText);
      $("#cursession").textContent = convoTitle(forConvo) || "chat";
    }
    renderConvos();
  }

  const turnKey = forConvo+"__"+Date.now().toString(36);
  const rec = {turnKey, abort:new AbortController(), watchdogAborted:false,
               lastEventTs:Date.now(), userStopped:false, steering:false, steerText:"", queued:null};
  inFlight.set(forConvo, rec);
  if(isActive()) syncComposerUI();
  setPending(forConvo, turnKey);

  let aWrap=null, aBody=null;
  function ensureBubble(){
    if(!isActive()) return null;
    if(!aBody){ aBody=addMsg("assistant"); aWrap=aBody.parentElement; }
    else if(!aWrap.isConnected){ clearEmpty(); messagesEl.append(aWrap); }
    return aBody;
  }
  ensureBubble();

  let finalText="";           // accumulated non-tool output
  let interrupted=false, stopped=false;
  let status="Processing prompt…";   // shown until real content arrives
  const toolLines=[];
  function repaint(){
    const b=ensureBubble(); if(!b) return;   // conversation isn't on screen — storage-only for now
    let html="";
    toolLines.forEach(t=> html+=toolHtml(t));
    const shown = stripDoneToken(finalText);   // never flash [[TASK_COMPLETE]]
    html += renderMarkdown(shown);
    if(inFlight.has(forConvo) && !shown) html += `<div class="status">⏺ ${esc(status)}</div>`;
    if(inFlight.has(forConvo)) html += `<span class="cursor"></span>`;
    b.innerHTML=html; scroll();
  }

  // Watchdog: if no event (server pings every 15s) arrives for 45s, the
  // stream is silently dead (mobile suspends the socket without firing an
  // error). Abort it so the code falls through to server-side reattach.
  const watchdog=setInterval(()=>{
    if(Date.now()-rec.lastEventTs > 45000){ rec.watchdogAborted=true; rec.abort.abort(); }
  }, 5000);

  try{
    const resp=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:sendText, session:turnKey, history, agent_mode:agentMode,
        model:selectedModel?selectedModel.model:"", provider:selectedModel?selectedModel.provider:""}),
      signal:rec.abort.signal});
    const reader=resp.body.getReader(); const dec=new TextDecoder();
    let buf="";
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      rec.lastEventTs=Date.now();
      buf+=dec.decode(value,{stream:true});
      let idx;
      while((idx=buf.indexOf("\n\n"))>=0){
        const raw=buf.slice(0,idx); buf=buf.slice(idx+2);
        const ev=parseSSE(raw); if(!ev) continue;
        if(ev.event==="ping"){
          // heartbeat only — keeps the watchdog fed
        } else if(ev.event==="chunk"){
          const line=ev.data.text ?? "";
          if(isToolLine(line)) toolLines.push(line);
          else finalText += (finalText?"\n":"") + line;
          repaint();
        } else if(ev.event==="tool"){
          // Live agent activity, Claude-code style: commands, their output,
          // and finished sub-step messages — each stamped with its time.
          const d=ev.data||{}; const t=fmtClock(d.ts);
          if(d.kind==="call"){ toolLines.push(`${t}  ● ${d.name}${d.args?" "+d.args:""}`); status=`Running tool: ${d.name}`; }
          else if(d.kind==="result"){ toolLines.push(`${t}  ↳ ${d.text||""}`); status="Processing result…"; }
          else if(d.kind==="interim" && d.text){
            finalText += (finalText?"\n\n":"") + d.text;
            status="Generating…";
          }
          repaint();
        } else if(ev.event==="error"){
          finalText += `\n\n_error: ${ev.data.message}_`; repaint();
        }
      }
    }
  }catch(e){
    if(e && e.name==="AbortError" && rec.watchdogAborted){
      interrupted=true;
      finalText += `${finalText?"\n\n":""}_⚠ connection interrupted — reattaching to the running turn…_`;
    } else if(e && e.name==="AbortError"){
      // Deliberate Stop or /steer — either way the turn itself was killed.
      stopped=true;
      finalText += `${finalText?"\n\n":""}_⏹ stopped_`;
    } else {
      // Stream dropped without the watchdog catching it yet (e.g. immediate
      // network failure). The turn keeps running on the server; reattach and
      // replay from the server-side turn record.
      interrupted=true;
      finalText += `${finalText?"\n\n":""}_⚠ connection interrupted — reattaching to the running turn…_`;
    }
  }finally{
    clearInterval(watchdog);
    const taskComplete = finalText.includes(AGENT_DONE_TOKEN);
    finalText = stripDoneToken(finalText);
    inFlight.delete(forConvo);
    if(isActive()){ syncComposerUI(); updateQueueBar(); }
    // Persist the assistant turn (with a completion timestamp shown under
    // the message) into the CONVERSATION'S OWN storage — never the global
    // `messages`/`activeId`, which may now point at a different conversation
    // if the user navigated away while this turn was running.
    let cur = loadMsgs(forConvo);
    cur = [...cur, {role:"assistant", text:finalText, tools:toolLines, ts:Date.now()}];
    saveMsgs(forConvo, cur);
    touchConvo(forConvo, null); renderConvos();
    if(isActive()){ repaint(); updateCtxMeter(); if(!isAuto) $("#input").focus(); }

    if(interrupted){
      recoverPending(forConvo);          // start re-asking the server right away
    } else {
      clearPending(forConvo);
      fetch("/api/turn/"+encodeURIComponent(turnKey)+"/ack",{method:"POST"}).catch(()=>{});
      if(rec.steering){
        const progress = finalText ? `Partial progress/output before being interrupted: ${finalText.slice(-1500)}`
                                    : `(no output had been produced yet before being interrupted)`;
        send({
          text: `[The previous attempt was stopped mid-step so the user could redirect it.] ${progress}\nNew instruction — take this into account and continue accordingly: ${rec.steerText}`,
          displayText: `↪ Steer: ${rec.steerText}`,
          convoId: forConvo,
        });
      } else if(rec.queued){
        send({text: rec.queued, convoId: forConvo, isQueued:true});
      } else if(agentMode && !stopped && !taskComplete && agentRounds < AGENT_MAX_ROUNDS){
        agentRounds++;
        if(isActive()) toast(`Agent mode — continuing (round ${agentRounds+1})…`);
        setTimeout(()=>send({text:AGENT_CONTINUE_PROMPT, convoId:forConvo, isAuto:true}), 250);
      } else if(agentMode && !taskComplete && agentRounds >= AGENT_MAX_ROUNDS){
        if(isActive()) toast(`Agent stopped after ${AGENT_MAX_ROUNDS} auto-continue rounds`);
      }
    }
  }
}
function isToolLine(l){
  const t=l.trim();
  return /^(\[|●|✓|✗|→|↳|⟳|⏺|tool|Running|Executing|\$ )/i.test(t) && t.length<200;
}
function parseSSE(raw){
  let event="message", data="";
  raw.split("\n").forEach(l=>{
    if(l.startsWith("event:")) event=l.slice(6).trim();
    else if(l.startsWith("data:")) data+=l.slice(5).trim();
  });
  if(!data) return {event,data:{}};
  try{ return {event,data:JSON.parse(data)}; }catch{ return {event,data:{}}; }
}

  const sb=$("#sidebar"), bd=$("#backdrop");

/* ---------- model picker (online models) ----------
   fallback_providers in ~/.hermes/config.yaml is normally an AUTOMATIC
   failover chain — Hermes only tries it when the primary model errors. This
   picker repurposes the same list as an ON-DEMAND menu: whichever entry is
   selected gets sent as `-m <model> --provider <provider>` for just the next
   message (see /api/models, /api/chat), no config change, no restart. */
const MODEL_LS="hermes_selected_model";
let selectedModel = readJSON(MODEL_LS, null);   // null = Hermes' configured default
let modelOptions = [];   // [{model, provider}], fetched from /api/models

async function fetchModels(){
  try{
    const r=await fetch("/api/models"); const j=await r.json();
    modelOptions = j.options||[];
    renderModelBtn();
  }catch(e){ /* backend offline */ }
}
function renderModelBtn(){
  const btn=$("#modelbtn");
  if(selectedModel){
    btn.textContent = `🌐 ${selectedModel.model}`;
    btn.title = `Using ${selectedModel.model} (${selectedModel.provider}) for the next message`;
    btn.classList.add("online");
  } else {
    btn.textContent = "🖥 Local";
    btn.title = "Pick which model handles the next message";
    btn.classList.remove("online");
  }
}
function pickModel(opt){
  selectedModel = opt;   // null clears back to the local default
  try{
    if(opt) localStorage.setItem(MODEL_LS, JSON.stringify(opt));
    else localStorage.removeItem(MODEL_LS);
  }catch(e){}
  renderModelBtn();
  closeModelMenu();
  toast(opt ? `Next message routes to ${opt.model} (${opt.provider})` : "Back to the local model");
}
function closeModelMenu(){ const m=document.getElementById("modelmenu"); if(m) m.remove(); }
function toggleModelMenu(){
  if(document.getElementById("modelmenu")){ closeModelMenu(); return; }
  const menu=document.createElement("div"); menu.className="modelmenu"; menu.id="modelmenu";
  const localItem=document.createElement("div");
  localItem.className="item"+(!selectedModel?" sel":"");
  localItem.innerHTML=`<span>🖥 Local (default)</span>`;
  localItem.onclick=(e)=>{ e.stopPropagation(); pickModel(null); };
  menu.append(localItem);
  if(modelOptions.length){
    const sep=document.createElement("div"); sep.className="sep"; menu.append(sep);
    modelOptions.forEach(opt=>{
      const sel = selectedModel && selectedModel.model===opt.model && selectedModel.provider===opt.provider;
      const el=document.createElement("div"); el.className="item"+(sel?" sel":"");
      el.innerHTML=`<span>🌐 ${esc(opt.model)}<small>${esc(opt.provider)}</small></span>`;
      el.onclick=(e)=>{ e.stopPropagation(); pickModel(opt); };
      menu.append(el);
    });
  } else {
    const empty=document.createElement("div"); empty.className="item"; empty.style.color="var(--muted)";
    empty.textContent="No fallback_providers configured";
    menu.append(empty);
  }
  menu.addEventListener("click", e=>e.stopPropagation());
  $("#composer .wrap").append(menu);
}
$("#modelbtn").onclick=(e)=>{ e.stopPropagation(); toggleModelMenu(); };
document.addEventListener("click", closeModelMenu);
renderModelBtn();
fetchModels();

/* ---------- wiring ---------- */
// The composer reads its own box, decides slash-command vs. plain message,
// and — for a plain message — always sends against the ACTIVE conversation.
async function sendFromComposer(){
  const raw=$("#input").value.trim();
  if(!raw) return;
  if(trySlashCommand(raw)){ $("#input").value=""; $("#input").style.height="auto"; return; }
  await send();
}
$("#send").onclick=()=>{ if(isBusy(activeId)) stopGeneration(); else sendFromComposer(); };
const input=$("#input");
input.addEventListener("input",()=>{
  input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,200)+"px";
  updateSlashMenu(input.value);
});
input.addEventListener("keydown",e=>{
  if(handleSlashMenuKey(e)) return;
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendFromComposer(); }
});
input.addEventListener("blur",()=>setTimeout(closeSlashMenu,150));   // allow a menu click to register first
$("#newchat").onclick=()=>{ newConvo(); };

/* ---------- slash-command autocomplete ---------- */
let slashSel=0;
function closeSlashMenu(){ const m=document.getElementById("slashmenu"); if(m) m.remove(); }
function slashMatches(raw){
  const m=raw.match(/^\/(\w*)$/);
  if(!m) return null;
  const q=m[1].toLowerCase();
  return Object.entries(SLASH_COMMANDS).filter(([name])=>name.startsWith(q));
}
function updateSlashMenu(raw){
  const matches=slashMatches(raw);
  closeSlashMenu();
  if(!matches || !matches.length) return;
  slashSel=Math.min(slashSel, matches.length-1);
  const menu=document.createElement("div"); menu.className="slashmenu"; menu.id="slashmenu";
  matches.forEach(([name,cmd],i)=>{
    const el=document.createElement("div"); el.className="item"+(i===slashSel?" sel":"");
    el.innerHTML=`<b>/${name}</b><small>${esc(cmd.desc)}</small>`;
    el.onmousedown=(e)=>{ e.preventDefault(); $("#input").value=`/${name} `; $("#input").focus(); closeSlashMenu(); };
    menu.append(el);
  });
  $("#composer .wrap").append(menu);
}
function handleSlashMenuKey(e){
  const menu=document.getElementById("slashmenu"); if(!menu) return false;
  const matches=slashMatches($("#input").value); if(!matches||!matches.length){ closeSlashMenu(); return false; }
  if(e.key==="ArrowDown"){ e.preventDefault(); slashSel=(slashSel+1)%matches.length; updateSlashMenu($("#input").value); return true; }
  if(e.key==="ArrowUp"){ e.preventDefault(); slashSel=(slashSel-1+matches.length)%matches.length; updateSlashMenu($("#input").value); return true; }
  if(e.key==="Tab" || e.key==="Enter"){
    e.preventDefault();
    const [name]=matches[slashSel];
    $("#input").value=`/${name} `;
    closeSlashMenu();
    return true;
  }
  if(e.key==="Escape"){ closeSlashMenu(); return true; }
  return false;
}

/* ---------- reattach to a lost turn (per conversation) ----------
   The server keeps a durable record of every turn (status + events + reply),
   keyed by turn key. PENDING_LS maps EACH conversation to its own turn key —
   never a single global slot — so a turn started in one chat can't be
   clobbered or lost by starting/recovering another turn in a different chat.
   After any drop — phone lock, backgrounded browser, page reload, wifi blip,
   opening a new tab — we re-ask "ну що там?" until each pending turn
   resolves, and ALWAYS apply the result to the conversation the turn
   actually belongs to (never whichever conversation happens to be on screen
   when the response arrives). The server only reports failed=true after
   checking its records, the live process, AND the Hermes session store. */
const recoverTimers = new Map();   // convoId -> setTimeout handle

function getPending(){ return readJSON(PENDING_LS, {}); }
function setPending(id, turnKey){ const p=getPending(); p[id]=turnKey; writeJSON(PENDING_LS, p); }
function clearPending(id){ const p=getPending(); delete p[id]; writeJSON(PENDING_LS, p); }

function rebuildFromRecord(j){
  const tools=[]; const interims=[];
  (j.events||[]).forEach(d=>{
    const t=fmtClock(d.ts);
    if(d.kind==="call") tools.push(`${t}  ● ${d.name}${d.args?" "+d.args:""}`);
    else if(d.kind==="result") tools.push(`${t}  ↳ ${d.text||""}`);
    else if(d.kind==="interim" && d.text) interims.push(d.text);
    // "chunk" events are the final reply — covered by j.text
  });
  const parsed=parseTurn(j.text||"");
  parsed.toolLines.forEach(t=>tools.push(t));
  let text=interims.join("\n\n");
  if(parsed.finalText) text += (text?"\n\n":"") + parsed.finalText;
  return {text, tools};
}

// Applies a recovered result to the conversation it belongs to (`id`) via
// storage, and only touches the live `messages`/DOM if that conversation is
// still the one on screen — exactly like send()'s isActive() guard, for the
// same reason: `id` was fixed when recovery started, `activeId` may have
// changed by the time this resolves.
function applyToConvo(id, msg){
  let arr = loadMsgs(id);
  const last = arr[arr.length-1];
  if(last && last.role==="assistant") arr=[...arr.slice(0,-1), {role:"assistant", ts:Date.now(), ...msg}];
  else arr=[...arr, {role:"assistant", ts:Date.now(), ...msg}];
  saveMsgs(id, arr);
  if(id===activeId){ renderConversation(); updateCtxMeter(); }
  renderConvos();
}

async function recoverPending(forId){
  const id = forId || activeId;
  if(!id || inFlight.has(id)) return;   // a live send() in this tab already owns this turn
  const turnKey = getPending()[id];
  if(!turnKey) return;
  try{
    const r=await fetch("/api/turn/"+encodeURIComponent(turnKey));
    const j=await r.json();
    if(inFlight.has(id)) return;   // a live send() started for this convo while we were awaiting
    if(j.done){
      applyToConvo(id, rebuildFromRecord(j));
      clearPending(id);
      fetch("/api/turn/"+encodeURIComponent(turnKey)+"/ack",{method:"POST"}).catch(()=>{});
      const t=recoverTimers.get(id); if(t){ clearTimeout(t); recoverTimers.delete(id); }
    } else if(j.running){
      // Show sub-steps completed so far + the real current condition (which
      // tool / generating), with elapsed time — not just "still generating".
      const partial=rebuildFromRecord(j);
      const elapsed = j.started ? ` · ${fmtElapsed(Date.now()/1000 - j.started)}` : "";
      partial.text += (partial.text?"\n\n":"") + `_⏳ ${j.label || "Working…"}${elapsed} (running on the server)_`;
      applyToConvo(id, partial);
      const t=setTimeout(()=>recoverPending(id), 4000);
      recoverTimers.set(id, t);
    } else if(j.failed){
      applyToConvo(id, {text:"_❌ Prompt processing failed._", tools:[]});
      clearPending(id);
    }
  }catch(e){
    const t=setTimeout(()=>recoverPending(id), 5000);
    recoverTimers.set(id, t);
  }
}
function recoverAllPending(){ Object.keys(getPending()).forEach(id=>recoverPending(id)); }
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) recoverAllPending(); });
window.addEventListener("focus", recoverAllPending);
window.addEventListener("pageshow", recoverAllPending);

// Startup: restore the active conversation (or the most recent) from storage.
(function boot(){
  if(!activeId || !convos.some(c=>c.id===activeId)){
    activeId = convos.length ? convos[0].id : newConvoId();
  }
  try{ localStorage.setItem(ACTIVE_LS, activeId); }catch(e){}
  messages = loadMsgs(activeId);
  $("#cursession").textContent = convoTitle(activeId) || "New chat";
  renderConvos(); renderConversation(); health(); fetchContext(); syncComposerUI(); updateQueueBar(); input.focus();
  recoverAllPending();   // pick up every conversation's reply interrupted before this load
})();
setInterval(health,15000);
setInterval(fetchContext,300000);   // refresh the fixed prompt budget every 5 min
</script>
